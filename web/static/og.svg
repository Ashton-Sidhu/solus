<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1A1714" />
      <stop offset="100%" stop-color="#0F0D0A" />
    </radialGradient>
    <radialGradient id="accent-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF6A" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#D4AF6A" stop-opacity="0" />
    </radialGradient>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF6A" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#D4AF6A" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#D4AF6A" stop-opacity="0.2" />
    </linearGradient>
    <clipPath id="mock-clip">
      <rect x="620" y="120" width="500" height="390" rx="12" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)" />
  <rect width="1200" height="630" fill="url(#accent-glow)" />

  <!-- Subtle noise texture dots -->
  <g opacity="0.03">
    <circle cx="100" cy="80" r="1" fill="#D4AF6A" />
    <circle cx="300" cy="150" r="0.8" fill="#D4AF6A" />
    <circle cx="500" cy="60" r="1.2" fill="#D4AF6A" />
    <circle cx="700" cy="200" r="0.6" fill="#D4AF6A" />
    <circle cx="900" cy="100" r="1" fill="#D4AF6A" />
    <circle cx="1100" cy="180" r="0.8" fill="#D4AF6A" />
    <circle cx="200" cy="500" r="1" fill="#D4AF6A" />
    <circle cx="400" cy="550" r="0.6" fill="#D4AF6A" />
  </g>

  <!-- Left side: Brand + copy -->
  <!-- Logo mark -->
  <g transform="translate(100, 200)">
    <circle cx="0" cy="0" r="19.2" fill="#D4AF6A" opacity="0.9" />
    <g fill="none" stroke="#D4AF6A" stroke-width="6.4" stroke-linecap="round" opacity="0.9">
      <path d="M 0,-32 A 32,32 0 0 1 32,0" />
      <path d="M 26.88,21.76 A 32,32 0 0 1 -10.24,30.72" />
      <path d="M -26.88,21.76 A 32,32 0 0 1 -32,-10.24" />
    </g>
  </g>

  <!-- Wordmark -->
  <text x="148" y="208" font-family="'Satoshi', 'Inter', sans-serif" font-size="42" font-weight="700" letter-spacing="-1" fill="#FAF9F6">solus</text>

  <!-- Headline -->
  <text x="68" y="300" font-family="'Satoshi', 'Inter', sans-serif" font-size="44" font-weight="700" letter-spacing="-1.5" fill="#FAF9F6" filter="url(#text-glow)">The desktop app</text>
  <text x="68" y="354" font-family="'Satoshi', 'Inter', sans-serif" font-size="44" font-weight="700" letter-spacing="-1.5" fill="#FAF9F6" filter="url(#text-glow)">for your <tspan fill="#D4AF6A">coding agent.</tspan></text>

  <!-- Subline -->
  <text x="68" y="410" font-family="'Inter', sans-serif" font-size="17" font-weight="400" fill="#A09488" letter-spacing="0.2">Plans, diffs, and conversations.</text>
  <text x="68" y="434" font-family="'Inter', sans-serif" font-size="17" font-weight="400" fill="#A09488" letter-spacing="0.2">Visual and keyboard-first.</text>

  <!-- Platform pills -->
  <rect x="68" y="476" width="78" height="28" rx="14" fill="none" stroke="#D4AF6A" stroke-width="0.8" opacity="0.3" />
  <text x="107" y="490" font-family="'Geist Mono', monospace" font-size="11" font-weight="500" fill="#D4AF6A" text-anchor="middle" dominant-baseline="central" opacity="0.6">macOS</text>

  <rect x="158" y="476" width="58" height="28" rx="14" fill="none" stroke="#D4AF6A" stroke-width="0.8" opacity="0.3" />
  <text x="187" y="490" font-family="'Geist Mono', monospace" font-size="11" font-weight="500" fill="#D4AF6A" text-anchor="middle" dominant-baseline="central" opacity="0.6">free</text>

  <!-- URL -->
  <text x="68" y="560" font-family="'Geist Mono', monospace" font-size="13" font-weight="400" fill="#6B6158" letter-spacing="1">solus.sh</text>

  <!-- Right side: App mockup -->
  <g clip-path="url(#mock-clip)">
    <!-- Window chrome -->
    <rect x="620" y="120" width="500" height="390" rx="12" fill="#1A1714" />
    <rect x="620" y="120" width="500" height="390" rx="12" fill="none" stroke="url(#card-border)" stroke-width="1" />

    <!-- Title bar -->
    <rect x="620" y="120" width="500" height="36" fill="#211E19" />
    <circle cx="642" cy="138" r="5" fill="#3d3530" />
    <circle cx="660" cy="138" r="5" fill="#3d3530" />
    <circle cx="678" cy="138" r="5" fill="#3d3530" />
    <text x="870" y="138" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#6B6158" text-anchor="middle" dominant-baseline="central">Solus · agent session</text>

    <!-- Chat area -->
    <!-- User message -->
    <rect x="750" y="176" width="350" height="36" rx="10" fill="#211E19" />
    <text x="766" y="194" font-family="'Inter', sans-serif" font-size="12" font-weight="400" fill="#FAF9F6" dominant-baseline="central">Add error handling to UserService.ts</text>

    <!-- Agent reply -->
    <rect x="640" y="228" width="16" height="16" rx="4" fill="#D4AF6A" opacity="0.2" />
    <circle cx="648" cy="236" r="4" fill="#D4AF6A" opacity="0.6" />
    <text x="668" y="236" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#A09488" dominant-baseline="central">Claude</text>

    <text x="640" y="264" font-family="'Inter', sans-serif" font-size="11.5" font-weight="400" fill="#A09488">I'll add typed Result returns and named</text>
    <text x="640" y="282" font-family="'Inter', sans-serif" font-size="11.5" font-weight="400" fill="#A09488">errors for missing users and expired tokens.</text>

    <!-- Plan card -->
    <rect x="640" y="302" width="460" height="140" rx="8" fill="#211E19" stroke="#D4AF6A" stroke-width="0.5" stroke-opacity="0.15" />
    <text x="660" y="326" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#D4AF6A" opacity="0.8">Plan</text>

    <!-- Plan step 1: completed -->
    <rect x="660" y="339" width="14" height="14" rx="3" fill="#2a4a2a" />
    <text x="667" y="346" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#4ade80" text-anchor="middle" dominant-baseline="central">&#x2713;</text>
    <text x="682" y="346" font-family="'Inter', sans-serif" font-size="11" font-weight="400" fill="#A09488" dominant-baseline="central">Define UserError union type</text>

    <!-- Plan step 2: completed -->
    <rect x="660" y="361" width="14" height="14" rx="3" fill="#2a4a2a" />
    <text x="667" y="368" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#4ade80" text-anchor="middle" dominant-baseline="central">&#x2713;</text>
    <text x="682" y="368" font-family="'Inter', sans-serif" font-size="11" font-weight="400" fill="#A09488" dominant-baseline="central">Wrap findUser in Result&lt;User, UserError&gt;</text>

    <!-- Plan step 3: in progress -->
    <rect x="660" y="383" width="14" height="14" rx="3" fill="#D4AF6A" opacity="0.15" />
    <text x="667" y="390" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#D4AF6A" text-anchor="middle" dominant-baseline="central" opacity="0.7">3</text>
    <text x="682" y="390" font-family="'Inter', sans-serif" font-size="11" font-weight="400" fill="#6B6158" dominant-baseline="central">Add try/catch to db operations</text>

    <!-- Plan step 4: pending -->
    <rect x="660" y="405" width="14" height="14" rx="3" fill="rgba(255,255,255,0.04)" />
    <text x="667" y="412" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#6B6158" text-anchor="middle" dominant-baseline="central">4</text>
    <text x="682" y="412" font-family="'Inter', sans-serif" font-size="11" font-weight="400" fill="#6B6158" dominant-baseline="central">Update callers to handle Result</text>

    <!-- Bottom input bar hint -->
    <rect x="640" y="462" width="460" height="32" rx="8" fill="#211E19" />
    <text x="660" y="478" font-family="'Inter', sans-serif" font-size="11" font-weight="400" fill="#6B6158" dominant-baseline="central">Comment on plan or approve...</text>
  </g>

  <!-- Soft edge fade on mockup -->
  <rect x="620" y="460" width="500" height="60" fill="url(#bg-glow)" opacity="0.7" />
</svg>